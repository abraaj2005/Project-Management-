<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Dashboard PRO</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
}

/* LOGIN */
.login-box{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
padding:30px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
box-shadow:0 8px 30px rgba(0,0,0,0.5);
}

/* PREMIUM LOGO */
.logo-box{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:15px;
}

.logo-box img{
width:110px;
height:110px;
border-radius:50%;
padding:6px;
background:rgba(255,255,255,0.9);
border:3px solid #00e6e6;
box-shadow:0 0 20px rgba(0,230,230,0.6);
animation:floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{
0%{transform:translateY(0px);}
50%{transform:translateY(-6px);}
100%{transform:translateY(0px);}
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
padding:10px;
border:none;
border-radius:8px;
background:#00e6e6;
font-weight:bold;
cursor:pointer;
}

button:hover{background:#00b3b3}

/* DASHBOARD */
.header{
background:#000;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{padding:15px;}

.project{
background:rgba(255,255,255,0.1);
margin:10px 0;
padding:15px;
border-radius:10px;
cursor:pointer;
}

.details{
background:#111;
padding:10px;
margin-top:5px;
border-radius:10px;
}

.hidden{display:none;}

.search-box{
display:flex;
gap:10px;
margin-bottom:10px;
}

.search-box input{flex:1;}

.btn{
display:inline-block;
margin-top:8px;
padding:8px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

.whatsapp{background:#25D366;color:#fff;}
.map{background:#ff9800;color:#fff;}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginPage">
<div class="card">

<!-- LOGO -->
<div class="logo-box">
<img src="Logo.png" alt="Company Logo">
</div>

<h2>Project Management  Login</h2>

<input type="text" id="username" placeholder="User Name">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="header">
<h3>Dashboard</h3>
<button onclick="logout()" style="background:red;color:#fff;">Logout</button>
</div>

<div class="container">

<div class="search-box">
<input type="text" id="search" placeholder="Search Mobile / Contact / Name">
<button onclick="searchData()">Search</button>
</div>

<button onclick="loadAll()">All Data</button>

<div id="projectList"></div>

</div>
</div>

<script>

let sheetID="1izeFN_u9rsSJfU1GWEsgUPY4z1oXirlT8rxZsPd5GLM";
let url=`https://opensheet.elk.sh/${sheetID}/Sheet1`;

let data=[];

// AUTO LOGIN
if(localStorage.getItem("login")==="true"){
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").classList.remove("hidden");
loadAll();
}

// LOGIN
function login(){
let u=document.getElementById("username").value.trim();
let p=document.getElementById("password").value.trim();

if(u==="admin" && p==="Abraaj1234"){
localStorage.setItem("login","true");
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").classList.remove("hidden");
loadAll();
}else{
alert("Invalid Login");
}
}

// LOGOUT
function logout(){
localStorage.removeItem("login");
location.reload();
}

// LOAD GOOGLE SHEET
function loadAll(){
fetch(url)
.then(res=>res.json())
.then(res=>{
data=res;
display(data);
});
}

// DISPLAY
function display(list){
let html="";

list.forEach((row,i)=>{

let mobile=row["Mobile no"]||"";
let client=row["Client Name"]||"";
let project=row["Project Serial Number"]||"";
let contact=row["Contanct"]||"";
let map=row["Map"]||"";

html+=`
<div class="project" onclick="toggle(${i})">
<b>${project}</b> - ${client}
</div>

<div id="d${i}" class="details hidden">

📱 Mobile: ${mobile}<br>
👤 Contact: ${contact}<br>
📍 Location: ${row["Location"]}<br>

<a class="btn whatsapp"
href="https://wa.me/${mobile}?text=Project:${project}%0AClient:${client}"
target="_blank">
WhatsApp
</a>

<a class="btn map"
href="${map}"
target="_blank">
Open Map
</a>

</div>
`;
});

document.getElementById("projectList").innerHTML=html;
}

// TOGGLE
function toggle(i){
let el=document.getElementById("d"+i);
if(el) el.classList.toggle("hidden");
}

// SEARCH
function searchData(){
let val=document.getElementById("search").value.trim().toLowerCase();

if(val===""){
display(data);
return;
}

let filtered=data.filter(r=>{
return (
(r["Mobile no"]||"").toLowerCase().includes(val) ||
(r["Contanct"]||"").toLowerCase().includes(val) ||
(r["Client Name"]||"").toLowerCase().includes(val)
);
});

display(filtered);
}

</script>

</body>
</html>
